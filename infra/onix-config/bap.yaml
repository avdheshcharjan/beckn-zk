appName: "beckn-zk-bap"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transaction_id
    - message_id

http:
  port: 8081
  timeout:
    read: 30
    write: 30
    idle: 30

pluginManager:
  root: /app/plugins

modules:
  - name: bapTxnCaller
    path: /bap/caller/
    handler:
      type: std
      role: bap
      httpClientConfig:
        maxIdleConns: 100
        maxIdleConnsPerHost: 50
        idleConnTimeout: 300s
        responseHeaderTimeout: 10s
      plugins:
        registry:
          id: registry
          config:
            url: http://registry:3030/subscribers
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: beckn-zk-bap
            keyId: beckn-zk-bap-key
            signingPrivateKey: ${BAP_PRIVATE_KEY}
            signingPublicKey: ${BAP_PUBLIC_KEY}
            encrPrivateKey: ${BAP_PRIVATE_KEY}
            encrPublicKey: ${BAP_PUBLIC_KEY}
        cache:
          id: cache
          config:
            addr: redis:6379
        router:
          id: router
          config:
            routingConfig: /config/routing-bap-caller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              contextKeys: transaction_id,message_id
              role: bap
      steps:
        - addRoute
        - sign

  - name: bapTxnReceiver
    path: /bap/receiver/
    handler:
      type: std
      role: bap
      httpClientConfig:
        maxIdleConns: 100
        maxIdleConnsPerHost: 50
        idleConnTimeout: 300s
        responseHeaderTimeout: 10s
      plugins:
        registry:
          id: registry
          config:
            url: http://registry:3030/subscribers
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: beckn-zk-bap
            keyId: beckn-zk-bap-key
            signingPrivateKey: ${BAP_PRIVATE_KEY}
            signingPublicKey: ${BAP_PUBLIC_KEY}
            encrPrivateKey: ${BAP_PRIVATE_KEY}
            encrPublicKey: ${BAP_PUBLIC_KEY}
        cache:
          id: cache
          config:
            addr: redis:6379
        signValidator:
          id: signvalidator
        router:
          id: router
          config:
            routingConfig: /config/routing-bap-receiver.yaml
        middleware:
          - id: reqpreprocessor
            config:
              contextKeys: transaction_id,message_id
              role: bap
      steps:
        - validateSign
        - addRoute
